<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Alex+Brush&display=swap" rel="stylesheet">

<style>

@page{
    size:A4 landscape;
    margin:0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:297mm;
    height:210mm;
    overflow:hidden;
}

body{
    font-family:'Montserrat',sans-serif;
}

.certificate{

    position:relative;

    width:297mm;
    height:210mm;

    background:url("https://media.discordapp.net/attachments/1525460994074349651/1525606808461250640/67b43e96-27ab-499d-b102-c1971cc440b1.png?ex=6a53ff8f&is=6a52ae0f&hm=f7ce8873fb7a7ccd45a97ecc01c2584955a2f71abaeab9f99500569763815d3c&=&format=webp&quality=lossless&width=1359&height=960") center center no-repeat;
    background-size:100% 100%;
}

/* ---------------- Nome ---------------- */

.nome{

    position:absolute;

    width:100%;

    top:111.5mm;

    text-align:center;

    font-size:19px;
    font-weight:700;

    color:white;

    letter-spacing:1px;

    text-transform:uppercase;

    text-shadow:
        0 0 5px #b84dff,
        0 0 10px #b84dff,
        0 0 18px rgba(184,77,255,.6);

}

/* ---------------- Assinaturas ---------------- */

.assinatura{

    position:absolute;

    font-size:24px; /* Aumentado um pouco para compensar o tamanho natural da fonte cursiva */

    color: white;
    white-space:nowrap;
}

.coord{
    bottom:23.5mm;
    left:23%;
}

.dir{
    bottom:23.5mm;
    left:62.5%;
}

/* ---------------- Código ---------------- */

.codigo{

    position:absolute;

    right:13mm;
    bottom:5mm;

    font-size:7px;

    color:rgba(255,255,255,.45);

    letter-spacing:1px;

}

</style>
</head>

<body>

<div class="certificate">

    <div class="nome">
        Victor Gustavo (Preview)
    </div>

    <div class="assinatura coord">
        Liliane Alves
    </div>

    <div class="assinatura dir">
        Lincoln Tavares
    </div>

    <div class="codigo">
        ID PREVIEW-VALID-89012
    </div>

</div>

</body>
</html>
